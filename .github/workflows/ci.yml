name: CI

on:
  pull_request:
    branches: [main]
    # `ready_for_review` joins the default types so CI fires the moment
    # a draft is flipped to ready, not the next push. Draft iterations
    # don't spend Actions minutes.
    types: [opened, synchronize, reopened, ready_for_review]
  # No `push` trigger — merging a PR to main re-runs the identical code
  # we already tested on the PR. Vercel handles main deploys independently.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, Typecheck, Build
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
