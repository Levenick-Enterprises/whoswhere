name: Deploy to prod tenant

# Manual gate between "main is green on dev" and "the bits are on a prod
# tenant." Pushing to main only auto-deploys the existing `whoswhere`
# Vercel project to dev.whos-where.com — every prod tenant has its
# Vercel git integration DISABLED and waits for this workflow to fire.

on:
  workflow_dispatch:
    inputs:
      tenant:
        description: "Which prod tenant to deploy"
        required: true
        type: choice
        options:
          - demo
          # Future tenants get added here AND get a matching
          # VERCEL_PROJECT_ID_<NAME> environment secret (under the `production`
          # environment) + a `case` arm below.

concurrency:
  # Serialize deploys per tenant — a second click while one is in flight
  # queues, doesn't race. `cancel-in-progress: false` so we don't abort
  # a half-done deploy.
  group: deploy-prod-${{ github.event.inputs.tenant }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.tenant }}
    runs-on: ubuntu-latest
    # Binds to the `production` GitHub environment. The environment's
    # protection rules (required reviewer + branch restriction to `main`)
    # are configured in repo Settings → Environments. Secrets used by this
    # job (VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID_*) are scoped to
    # the environment so only this protected job can read them.
    environment: production

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        # Pin exact version for reproducibility — bump deliberately when needed.
        # `@latest` would let a Vercel CLI major release silently break prod
        # deploys without any repo change.
        run: npm install -g vercel@50.28.0

      - name: Resolve Vercel project ID for tenant
        id: project
        run: |
          case "${{ github.event.inputs.tenant }}" in
            demo) PROJECT_ID="${{ secrets.VERCEL_PROJECT_ID_DEMO }}" ;;
            *)
              echo "Unknown tenant: ${{ github.event.inputs.tenant }}" >&2
              exit 1
              ;;
          esac
          if [ -z "$PROJECT_ID" ]; then
            echo "Missing VERCEL_PROJECT_ID_${{ github.event.inputs.tenant }} environment secret (production env)" >&2
            exit 1
          fi
          echo "id=$PROJECT_ID" >> "$GITHUB_OUTPUT"

      - name: Capture git metadata for build label
        # Vercel sets VERCEL_GIT_COMMIT_SHA / _MESSAGE natively on git-triggered
        # builds; the CLI-driven prod deploy needs them set explicitly so the
        # build can stamp the More-menu footer with the commit + PR number.
        id: meta
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "message=$(git log -1 --pretty=%s)" >> "$GITHUB_OUTPUT"

      - name: Pull Vercel project settings
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ steps.project.outputs.id }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for production
        env:
          VERCEL_GIT_COMMIT_SHA: ${{ steps.meta.outputs.sha }}
          VERCEL_GIT_COMMIT_MESSAGE: ${{ steps.meta.outputs.message }}
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ steps.project.outputs.id }}
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
